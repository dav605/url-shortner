<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="The short URL you visited does not exist or has expired." />
  <title>404 — Link Not Found | URL Shortener</title>

  <!-- Google Font: Plus Jakarta Sans & Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <!-- Our custom stylesheet (shared with index.html) -->
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>

  <!-- Background decorative blobs -->
  <div class="blob blob-1" aria-hidden="true"></div>
  <div class="blob blob-2" aria-hidden="true"></div>

  <!-- ═══════════════════════════════════════════════════════
       Error card — centred on the page
  ══════════════════════════════════════════════════════════ -->
  <main class="card error-card" role="main">

    <!-- Big 404 graphic -->
    <div class="error-icon" aria-hidden="true">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
           stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
    </div>

    <!-- HTTP status badge -->
    <span class="badge-404">404</span>

    <h1>Link Not Found</h1>

    <p class="subtitle">
      The short code
      <!-- Display the code that was typed in the browser -->
      <code class="inline-code">{{ code }}</code>
      doesn't exist or may have expired. Double-check the link and try again.
    </p>

    <!-- Button to go back home and create a new short link -->
    <a href="{{ url_for('index') }}" class="btn-home" id="btn-home">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
           stroke-linejoin="round" aria-hidden="true">
        <line x1="19" y1="12" x2="5" y2="12"/>
        <polyline points="12 19 5 12 12 5"/>
      </svg>
      Back to Home
    </a>

  </main><!-- /.card -->

</body>
</html>
